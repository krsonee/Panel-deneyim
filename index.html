<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #060a10;
      color: #e8edf5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 2rem;
    }
    .box {
      max-width: 520px;
      background: #0f1623;
      border: 1px solid #243044;
      border-radius: 16px;
      padding: 2.5rem 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #7d8da6; line-height: 1.6; margin-bottom: 1rem; }
    code {
      display: block;
      background: #04070c;
      border: 1px solid #243044;
      border-radius: 10px;
      padding: 1rem;
      text-align: left;
      font-size: 0.85rem;
      color: #94a3b8;
      margin: 1rem 0;
    }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.65rem 1.2rem;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Panel</h1>
    <p>
      Bu proje artık Python sunucusu ile çalışıyor.
      Dosyayı doğrudan açmak yerine terminalden sunucuyu başlat:
    </p>
    <code>cd "/Users/xx/Desktop/Panel deneyim"<br>pip3 install -r requirements.txt<br>python3 app.py</code>
    <p>Sunucu açıldıktan sonra:</p>
    <a href="http://127.0.0.1:8080/admin">Admin Paneli →</a>
  </div>
</body>
</html>
