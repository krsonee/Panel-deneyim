<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifre Değişikliği — Makro Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #060a10; color: #e8edf5; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .login-box {
      width: 100%; max-width: 420px; background: #0f1623; border: 1px solid #243044;
      border-radius: 18px; padding: 2.25rem 2rem; box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.25rem; }
    .logo span { color: #6366f1; }
    .sub { color: #7d8da6; font-size: 0.88rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #7d8da6; margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.75rem 0.9rem; margin-bottom: 1rem;
      background: #151e2e; border: 1px solid #243044; border-radius: 10px;
      color: #e8edf5; font-size: 0.95rem; text-align: left; letter-spacing: normal;
    }
    input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .btn {
      width: 100%; padding: 0.8rem; border: none; border-radius: 10px;
      background: #6366f1; color: #fff; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 0.25rem;
    }
    .btn:hover { filter: brightness(1.08); }
    .error {
      background: rgba(244,63,94,0.12); border: 1px solid rgba(244,63,94,0.35);
      color: #f43f5e; padding: 0.65rem 0.85rem; border-radius: 10px;
      font-size: 0.85rem; margin-bottom: 1rem;
    }
    .hint { margin-top: 1.25rem; font-size: 0.75rem; color: #7d8da6; text-align: center; }
    .step-hint { font-size: 0.78rem; color: #7d8da6; margin-bottom: 1rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">Makro<span>Panel</span></div>
    <p class="sub">Şifre Değişikliği Gerekli</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <p class="step-hint">
      Yönetici tarafından atanan şifreyi değiştirmeden devam edemezsiniz. Lütfen kendine ait yeni bir şifre belirle.
    </p>
    <form method="POST" action="{{ request.path }}">
      <label for="new_password">Yeni Şifre</label>
      <input id="new_password" name="new_password" type="password" autocomplete="new-password" required autofocus>
      <label for="confirm_password">Yeni Şifre (Tekrar)</label>
      <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
      <button type="submit" class="btn" id="submit-btn">Şifreyi Değiştir ve Devam Et</button>
    </form>
    <p class="hint"><a href="/admin/logout" style="color:#7d8da6;">Farklı hesapla giriş yap</a></p>
  </div>
  <script>
    document.querySelector("form").addEventListener("submit", function() {
      var btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Kaydediliyor…";
    });
  </script>
</body>
</html>
