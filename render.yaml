# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: makropanel
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 7200 --keep-alive 5
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://takipmkr.onrender.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false  # Şifre repoda tutulmaz; Render Dashboard'dan manuel set edilmeli.
      - key: DATABASE_URL
        fromDatabase:
          name: makropanel-db
          property: connectionString

databases:
  - name: makropanel-db
    plan: basic-256mb
    # basic-256mb ~$6/ay — veriler deploy sonrası da kalır (SQLite geçici diskte silinirdi)
