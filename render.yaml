# Render Blueprint — https://render.com/docs/blueprint-spec
# Makro panel + Bizzo panel + Mikromail (ayrı web/worker/db)
services:
  - type: web
    name: makropanel
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 120 --keep-alive 5
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PANEL_BRAND
        value: makro
      - key: SERVICE_MODE
        value: panel
      - key: MAILING_EMBEDDED
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://takipmkr.onrender.com
      - key: MIKROMAIL_URL
        value: https://mikromail.onrender.com
      - key: ADMIN_USERNAME
        value: tolgakt
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: makropanel-db
          property: connectionString

  - type: web
    name: mikromail
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn mailing_app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 7200 --keep-alive 5
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SERVICE_MODE
        value: mailing
      - key: PANEL_BRAND
        value: makro
      - key: MAILING_WORKER_EXTERNAL
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: MAILING_SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://mikromail.onrender.com
      - key: MAILING_SUPERADMIN_USER
        value: tolgakt
      - key: MAILING_SUPERADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: tolgakt
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mikromail-db
          property: connectionString

  - type: worker
    name: mikromail-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python mailing_worker_main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SERVICE_MODE
        value: mailing-worker
      - key: MAILING_WORKER_EXTERNAL
        value: "1"
      # Web ile AYNI secret — ayrı generateValue 535/decrypt kırıyordu
      - key: SECRET_KEY
        fromService:
          name: mikromail
          type: web
          envVarKey: SECRET_KEY
      - key: MAILING_SECRET_KEY
        fromService:
          name: mikromail
          type: web
          envVarKey: MAILING_SECRET_KEY
      - key: PUBLIC_BASE_URL
        value: https://mikromail.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: mikromail-db
          property: connectionString

  - type: web
    name: bizzopanel
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 120 --keep-alive 5
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PANEL_BRAND
        value: bizzo
      - key: SERVICE_MODE
        value: panel
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://bizzopanel.onrender.com
      - key: ADMIN_USERNAME
        value: tolgakt
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bizzopanel-db
          property: connectionString

databases:
  - name: makropanel-db
    plan: basic-256mb
  - name: mikromail-db
    plan: basic-1gb
  - name: bizzopanel-db
    plan: basic-256mb
